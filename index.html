<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SeaCap PDF Redactor (Stable Raster)</title>
  <style>
    :root{--muted:#6b7280;--card-border:#e5e7eb;--bg:#111;--ok:#0f766e;--err:#b91c1c}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:24px;max-width:900px}
    .card{border:1px solid var(--card-border);border-radius:14px;padding:18px}
    h2{margin:0 0 8px 0}
    .muted{color:var(--muted);font-size:14px;line-height:1.4}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
    input{font-size:16px}
    button{padding:10px 14px;border-radius:12px;border:0;background:var(--bg);color:#fff;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    progress{width:280px;height:14px}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
  </style>
</head>
<body>
  <div class="card">
    <h2>Upload → Download Redacted SEACAP PDF</h2>
    <p class="muted">
      Rasterized redaction. Only page 1 is kept. Stable across Windows + Mac.
    </p>

    <div class="row">
      <input id="file" type="file" accept="application/pdf"/>
      <button id="run" disabled>Redact & Download</button>
      <progress id="prog" value="0" max="1" style="display:none"></progress>
    </div>

    <p id="status" class="muted"></p>
  </div>

  <!-- pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.7.570/pdf.min.js"></script>
  <!-- pdf-lib -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.7.570/pdf.worker.min.js";

    const fileInput = document.getElementById("file");
    const runBtn = document.getElementById("run");
    const status = document.getElementById("status");
    const prog = document.getElementById("prog");

    fileInput.addEventListener("change", () => {
      runBtn.disabled = !fileInput.files?.[0];
    });

    runBtn.addEventListener("click", processPDF);

    async function processPDF() {
      const file = fileInput.files?.[0];
      if (!file) return;

      runBtn.disabled = true;
      prog.style.display = "inline-block";
      prog.value = 0;
      status.textContent = "Rendering page 1...";

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());

        // Load PDF (ignore encryption so it never fails)
        const pdf = await pdfjsLib.getDocument({
          data: bytes,
          password: "",
          ignoreEncryption: true
        }).promise;

        const page = await pdf.getPage(1);

        const SCALE = 2.0; // consistent scale
        const viewport = page.getViewport({ scale: SCALE });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: ctx,
          viewport
        }).promise;

        status.textContent = "Applying redactions...";

        // ==== YOUR REDACTION BOXES (normalized from Preview) ====
        const boxes = [
          { x: 0.465103, y: 0.581131, w: 0.483184, h: 0.042760 },
          { x: 0.640654, y: 0.326590, w: 0.307435, h: 0.046533 },
          { x: 0.055749, y: 0.235604, w: 0.325187, h: 0.044679 }
        ];

        ctx.fillStyle = "#000";

        boxes.forEach(b => {
          ctx.fillRect(
            b.x * canvas.width,
            b.y * canvas.height,
            b.w * canvas.width,
            b.h * canvas.height
          );
        });

        prog.value = 0.7;
        status.textContent = "Building final PDF...";

        const outPdf = await PDFLib.PDFDocument.create();

        const pngBlob = await new Promise(resolve =>
          canvas.toBlob(resolve, "image/png")
        );

        const pngBytes = await pngBlob.arrayBuffer();
        const pngImage = await outPdf.embedPng(pngBytes);

        const pageOut = outPdf.addPage([
          canvas.width,
          canvas.height
        ]);

        pageOut.drawImage(pngImage, {
          x: 0,
          y: 0,
          width: canvas.width,
          height: canvas.height
        });

        const outBytes = await outPdf.save();

        const blob = new Blob([outBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = file.name.replace(/\.pdf$/i,"") + " - REDACTED (PAGE 1 ONLY).pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(() => URL.revokeObjectURL(url), 2000);

        prog.value = 1;
        status.textContent = "Done.";
      } catch (err) {
        console.error(err);
        status.textContent = "Error: " + err.message;
      }

      prog.style.display = "none";
      runBtn.disabled = false;
    }
  </script>
</body>
</html>
