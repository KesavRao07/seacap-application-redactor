<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SeaCap PDF Redactor</title>
  <style>
    :root{--muted:#6b7280;--card-border:#e5e7eb;--bg:#111;--ok:#0f766e;--err:#b91c1c}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:24px;max-width:900px}
    .card{border:1px solid var(--card-border);border-radius:14px;padding:18px}
    h2{margin:0 0 8px 0}
    .muted{color:var(--muted);font-size:14px;line-height:1.4}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
    input{font-size:16px}
    button{padding:10px 14px;border-radius:12px;border:0;background:var(--bg);color:#fff;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    progress{width:280px;height:14px}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <h2 id="title">Upload → Download Redacted SEACAP APP PDF</h2>
    <p class="muted">
      Upload a signed SEACAP PDF and download a redacted copy. <b>Only page 1 is kept</b>.
      Redaction is done in <b>PDF points</b> (stable on Windows + Mac).
    </p>

    <div id="libStatus" class="muted" aria-live="polite"></div>

    <div class="row" style="margin-top:12px">
      <input id="runFile" type="file" accept="application/pdf" aria-label="Upload PDF"/>
      <button id="runRedact" disabled>Redact & Download</button>
      <progress id="prog" value="0" max="1" style="display:none"></progress>
    </div>

    <p id="runStatus" class="muted" style="margin-top:10px" aria-live="polite"></p>
  </div>

  <!-- pdf-lib only -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <script>
    // ======== Redaction boxes from macOS Preview (Units: Points) ========
    // These are Top-origin measurements (Preview measures "Top" from top of page).
    // We'll convert to PDF bottom-origin using: y = pageHeight - top - height
    const BOXES_TOP_ORIGIN = [
      { label: "Redact_1", left:  889.51, top: 1438.30, width: 924.09, height: 105.83 },
      { label: "Redact_2", left: 1225.25, top:  808.31, width: 587.97, height: 115.17 },
      { label: "Redact_3", left:  106.62, top:  583.12, width: 621.92, height: 110.58 }
    ];

    const libStatus = document.getElementById("libStatus");
    const runFile = document.getElementById("runFile");
    const runRedact = document.getElementById("runRedact");
    const runStatus = document.getElementById("runStatus");
    const prog = document.getElementById("prog");

    function setStatus(text, kind) {
      runStatus.textContent = text || "";
      runStatus.className = kind === "ok" ? "ok" : kind === "err" ? "err" : "muted";
    }

    function libsReady() {
      return typeof window.PDFLib !== "undefined";
    }

    (function boot() {
      if (!libsReady()) {
        libStatus.innerHTML = '<span class="err">pdf-lib failed to load. Refresh the page.</span>';
        return;
      }
      libStatus.innerHTML = '<span class="ok">Ready ✅</span>';

      runFile.addEventListener("change", () => {
        runRedact.disabled = !runFile.files?.[0];
        setStatus("");
        prog.style.display = "none";
      });

      runRedact.addEventListener("click", redactAndDownload);
    })();

    async function redactAndDownload() {
      const f = runFile.files?.[0];
      if (!f) return;

      runRedact.disabled = true;
      prog.style.display = "inline-block";
      prog.value = 0;
      prog.max = 1;

      try {
        setStatus("Loading PDF…");
        const bytes = await f.arrayBuffer();

        const { PDFDocument, rgb } = PDFLib;

        // Load original
        const srcPdf = await PDFDocument.load(bytes, { ignoreEncryption: true });

        if (srcPdf.getPageCount() < 1) throw new Error("PDF has no pages");

        // Create output doc with ONLY page 1 copied in (this avoids “white blank page” issue)
        const outPdf = await PDFDocument.create();
        const [copiedPage] = await outPdf.copyPages(srcPdf, [0]);
        outPdf.addPage(copiedPage);

        // Get size in PDF points
        const page = outPdf.getPage(0);
        const { width: pageW, height: pageH } = page.getSize();

        setStatus("Applying redaction…");

        // Draw black boxes in PDF coordinates (bottom-left origin)
        for (const b of BOXES_TOP_ORIGIN) {
          const x = b.left;
          const y = pageH - b.top - b.height; // convert Top-origin -> PDF bottom-origin

          page.drawRectangle({
            x,
            y,
            width: b.width,
            height: b.height,
            color: rgb(0, 0, 0),
            borderWidth: 0
          });
        }

        prog.value = 0.8;
        setStatus("Saving redacted PDF (page 1 only)…");

        const outBytes = await outPdf.save();

        const blob = new Blob([outBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = (f.name.replace(/\.pdf$/i, "") || "REDACTED") + " - REDACTED (PAGE 1 ONLY).pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(() => URL.revokeObjectURL(url), 2000);

        prog.value = 1;
        setStatus("Done. Download started.", "ok");
      } catch (err) {
        console.error(err);
        setStatus("Failed: " + (err?.message || "Unknown error"), "err");
      } finally {
        prog.style.display = "none";
        runRedact.disabled = false;
      }
    }
  </script>
</body>
</html>
